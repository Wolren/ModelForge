---
name: Package plugin

mopermissions:
  contents: write
steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-tags: true

      - name: Read version from metadata.txt
        id: metadata
        shell: pwsh
        run: |
          $content = Get-Content -Path model_forge/metadata.txt
          $version = ($content | Select-String '^version=(.+)').Matches.Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package plugin
        shell: pwsh
        run: |
          Set-Location -LiteralPath model_forge
          Compress-Archive -Path * -DestinationPath ../model_forge.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: model_forge
          path: model_forge.zip

      - name: Create tag if new version
        id: tag
        shell: pwsh
        run: |
          $tag = "v${{ steps.metadata.outputs.version }}"
          $existing = git ls-remote --tags origin "refs/tags/$tag" 2>$null
          if (-not $existing) {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a $tag -m "Release $tag"
            git push origin $tag
            "created=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "created=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create release
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${!{ github.token }}
        run: |
          gh release create "v${{ steps.metadata.outputs.version }}" \
            --title "Model Forge v${{ steps.metadata.outputs.version }}" \
            --notes "See [metadata.txt](https://github.com/Wolren/ModelForge/blob/master/model_forge/metadata.txt)" \
            --generate-notes \
            model_forge.zip
